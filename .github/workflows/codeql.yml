name: CodeQL (Python)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: github/codeql-action/init@9e8d0789d4a0fa9ceb6f0a2e634a2de2c2e79db5  # v3.28.9
        with:
          languages: python
      - uses: github/codeql-action/analyze@9e8d0789d4a0fa9ceb6f0a2e634a2de2c2e79db5  # v3.28.9
