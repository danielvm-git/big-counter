release: bcp-plus-1.0
source_scope: specs/product/SCOPE_LATEST.yaml
notes: >
  WSJF = (business value + time criticality + risk reduction) / job size.
  Ordering below is WSJF-descending; depends_on constrains actual start order
  (e.g. e03 may run any time despite ranking below e01).
hard_gates:
  - gate: e01-before-e02
    description: >
      HARD GATE — Behavior-preserving Dimension Module refactor must land before
      the Element Router. The Router depends on the new module shape (protocol,
      validate, score) and the calculator loop refactored in e01. No Router code
      can be written until e01 is merged and tests pass.
    depends: e02 starts only after e01 completed
  - gate: e08-before-e09
    description: >
      HARD GATE — 13-dimension stability tuning must complete before publishing
      the whitepaper evolution or preparing the upstream offer. e09 depends on
      CV data from e08 to justify ruler changes. No publish work begins until
      aggregate CV meets the ≈10-15% target on the `reliable` maturity bucket.
epics:
  - id: e01
    slug: e01-dimension-module-refactor
    title: Behavior-preserving Dimension Module refactor
    wsjf: 8.3
    depends_on: []
  - id: e03
    slug: e03-provider-config
    title: Provider configuration cleanup
    wsjf: 6.0
    depends_on: []
  - id: e02
    slug: e02-element-router
    title: Element Router, failure semantics, orchestration + verdict
    wsjf: 5.8
    depends_on: [e01]
  - id: e04
    slug: e04-stability-harness
    title: Stability harness (record / report / replay)
    wsjf: 5.5
    depends_on: [e01, e02]
  - id: e05
    slug: e05-functional-simple-dimensions
    title: Simple functional dimensions (Notifications, Audits, Background, Entities)
    wsjf: 5.0
    depends_on: [e02]
  - id: e06
    slug: e06-functional-complex-dimensions
    title: Complex functional dimensions (Roles/Permissions, Variabilities)
    wsjf: 4.0
    depends_on: [e02]
  - id: e07
    slug: e07-nfr-dimensions
    title: NFR dimensions with sizer-level gate (SNAP-derived criteria)
    wsjf: 3.8
    depends_on: [e02]
  - id: e08
    slug: e08-stability-tuning
    title: 13-dimension stability tuning to CV targets
    wsjf: 3.5
    depends_on: [e04, e05, e06, e07]
  - id: e09
    slug: e09-package-and-publish
    title: Whitepaper evolution + OKF ruler bundle + upstream offer
    wsjf: 3.0
    depends_on: [e08]
  - id: e10
    slug: e10-okf-results-output
    title: BCP results serialized as OKF bundle with graph visualization
    wsjf: 2.5
    depends_on: [e02]
  - id: e11
    slug: e11-okf-domain-input
    title: Domain knowledge OKF bundle as BCP scoring reference material
    wsjf: 2.0
    depends_on: [e05, e06, e07]
