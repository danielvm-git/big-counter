repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 25a8c8da6c24a3b9a1a536e2674683dd0eead5d6  # v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: venv/bin/mypy src/
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: venv/bin/python -m pytest tests/unit/ -q -o "addopts="
        language: system
        pass_filenames: false
        types: [python]
        always_run: true
